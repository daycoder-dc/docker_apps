services:
  n8n_app:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n_app
    restart: always
    labels:
      - traefik.enable=true
      - traefik.http.routers.${COMPOSE_PROJECT_NAME}.rule=Host(`${TRAEFIK_HOST}`)
      - traefik.http.routers.${COMPOSE_PROJECT_NAME}.entrypoints=websecure
      - traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls.certresolver=letsencrypt
      - traefik.http.services.${COMPOSE_PROJECT_NAME}.loadbalancer.server.port=5678
    environment:
      # N8N configuration
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - N8N_RUNNERS_ENABLED=true
      - N8N_RUNNERS_MODE=external
      - N8N_RUNNERS_BROKER_LISTEN_ADDRESS=0.0.0.0
      - N8N_RUNNERS_AUTH_TOKEN=${RUNNERS_AUTH_TOKEN}
      - N8N_NATIVE_PYTHON_RUNNER=true
      - N8N_SECURE_COOKIE=true
      - N8N_PROXY_HOPS=1
      - WEBHOOK_URL=https://${TRAEFIK_HOST}
      - GENERIC_TIMEZONE=${TZ}
      - TZ=${TZ}
      # Node configuration
      - NODE_OPTIONS=--max-old-space-size=2048
      # Postgresql configuration
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DATABASE}
      - DB_POSTGRESDB_HOST=${POSTGRES_HOST}
      - DB_POSTGRESDB_PORT=${POSTGRES_PORT}
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_POSTGRESDB_SCHEMA=${POSTGRES_SCHEMA}
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - share_network

  task_runners:
    image: docker.n8n.io/n8nio/runners
    container_name: n8n_runners
    environment:
      - N8N_RUNNERS_TASK_BROKER_URI=http://n8n_app:5678
      - N8N_RUNNERS_AUTH_TOKEN=${RUNNERS_AUTH_TOKEN}
    networks:
      - share_network
    depends_on:
      - n8n_app

volumes:
  n8n_data:

networks:
  share_network:
    external: true
