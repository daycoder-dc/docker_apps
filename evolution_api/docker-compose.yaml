services:
  evolution_ap:
    image: evoapicloud/evolution-api:latest
    container_name: evolution_app
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.evolution_app.rule=Host(`${TRAEFIK_HOST}`)
      - traefik.http.routers.evolution_app.entrypoints=websecure
      - traefik.http.routers.evolution_app.tls.certresolver=letsencrypt
      - traefik.http.services.evolution_app.loadbalancer.server.port=8080
    env_file:
      - .env
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - share_network

volumes:
  evolution_instances:


networks:
  share_network:
    external: true
